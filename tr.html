<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendWise — Expense Tracker</title>
    <meta name="description" content="Track your personal expenses with categories, backup & restore">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" id="manifest-link">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Lato:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-body: 'DM Sans', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
            --bg: #f4f5fa;
            --bg-card: #ffffff;
            --bg-card-hover: #f3f4f9;
            --bg-input: #f6f7fb;
            --fg: #1a1d2b;
            --fg-dim: #64687d;
            --muted: #9498ad;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --accent-glow: rgba(245,158,11,0.12)  ;
            --border: #e7e8f0;
            --danger: #ef4444;
            --danger-glow: rgba(239,68,68,0.1);
            --success: #10b981;
            --success-glow: rgba(16,185,129,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden; }
        h1,h2,h3,h4,h5 { font-family: var(--font-heading); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        /* Background blobs */
        .blob { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.5; pointer-events: none; z-index: 0; }
        .blob-1 { width: 500px; height: 500px; background: rgba(245,158,11,0.10); top: -150px; right: -100px; animation: blobFloat1 20s ease-in-out infinite; }
        .blob-2 { width: 400px; height: 400px; background: rgba(59,130,246,0.07); bottom: -100px; left: -100px; animation: blobFloat2 25s ease-in-out infinite; }
        @keyframes blobFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,80px)} }
        @keyframes blobFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-60px)} }

        /* Sidebar */
        #sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-right: 1px solid var(--border); z-index: 40; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; margin: 2px 12px; border-radius: 10px; color: var(--fg-dim); cursor: pointer; transition: all 0.2s ease; font-size: 14px; font-weight: 500; }
        .nav-item:hover { background: var(--bg-card-hover); color: var(--fg); }
        .nav-item.active { background: var(--accent-glow); color: var(--accent); }
        .nav-item.active i { color: var(--accent); }
        .nav-item i { width: 20px; text-align: center; font-size: 15px; }
        .add-btn-sidebar { margin: 16px 16px 8px; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: var(--font-heading); font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; }
        .add-btn-sidebar:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(245,158,11,0.3); }

        /* Main content */
        #app { margin-left: 240px; min-height: 100vh; position: relative; z-index: 1; padding: 32px; }
        .page-enter { animation: pageIn 0.35s ease-out; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: all 0.25s ease; }
        .card:hover { border-color: rgba(245,158,11,0.2); }
        .stat-card { position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: -30px; right: -30px; width: 80px; height: 80px; border-radius: 50%; opacity: 0.06; }
        .stat-card.amber::after { background: var(--accent); }
        .stat-card.red::after { background: var(--danger); }
        .stat-card.green::after { background: var(--success); }
        .stat-card.blue::after { background: #3b82f6; }

        /* Inputs */
        .input-field { width: 100%; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; color: var(--fg); font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.2s ease; }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .input-field::placeholder { color: var(--muted); }
        .amount-input { font-family: var(--font-heading); font-size: 48px; font-weight: 700; text-align: center; background: transparent; border: none; color: var(--fg); outline: none; width: 100%; }
        .amount-input::placeholder { color: var(--muted); }

        /* Category grid */
        .cat-grid-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 8px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: all 0.2s ease; background: var(--bg-input); }
        .cat-grid-item:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
        .cat-grid-item.selected { border-color: var(--accent); background: var(--accent-glow); transform: scale(1.02); }
        .cat-grid-item .cat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .cat-grid-item .cat-name { font-size: 11px; color: var(--fg-dim); text-align: center; line-height: 1.2; }

        /* Transaction item */
        .tx-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 12px; transition: background 0.2s ease; cursor: pointer; }
        .tx-item:hover { background: var(--bg-card-hover); }
        .tx-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

        /* Bottom nav */
        #bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 40; padding: 6px 0 env(safe-area-inset-bottom, 8px); }
        .bnav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px; color: var(--muted); cursor: pointer; transition: color 0.2s; font-size: 10px; flex: 1; }
        .bnav-item i { font-size: 18px; }
        .bnav-item.active { color: var(--accent); }
        .bnav-center { position: relative; top: -16px; }
        .bnav-center-btn { width: 50px; height: 50px; border-radius: 16px; background: var(--accent); color: #000; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(245,158,11,0.35); transition: all 0.2s; }
        .bnav-center-btn:hover { transform: scale(1.08); }

        /* FAB */
        #fab { display: none; position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: var(--accent); color: #000; border: none; font-size: 24px; cursor: pointer; z-index: 35; box-shadow: 0 4px 24px rgba(245,158,11,0.4); transition: all 0.25s; }
        #fab:hover { transform: scale(1.1) rotate(90deg); }

        /* Modal */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        #modal-overlay.show { display: flex; }
        #modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 28px; max-width: 480px; width: 100%; max-height: 85vh; overflow-y: auto; animation: modalIn 0.3s ease-out; }
        @keyframes modalIn { from { opacity:0; transform:translateY(20px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

        /* Toasts */
        #toasts { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s ease-out; min-width: 260px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .toast.success { background: #ecfdf5; color: #065f46; border: 1px solid #10b981; }
        .toast.error { background: #fef2f2; color: #991b1b; border: 1px solid #ef4444; }
        .toast.info { background: #eff6ff; color: #1e40af; border: 1px solid #3b82f6; }
        .toast.out { animation: toastOut 0.3s ease-in forwards; }
        @keyframes toastIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(40px); } }

        /* Buttons */
        .btn-primary { padding: 12px 24px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: var(--font-heading); font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,158,11,0.3); }
        .btn-secondary { padding: 12px 24px; background: var(--bg-card-hover); color: var(--fg); border: 1px solid var(--border); border-radius: 10px; font-family: var(--font-heading); font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { padding: 12px 24px; background: var(--danger); color: #fff; border: none; border-radius: 10px; font-family: var(--font-heading); font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 8px 14px; font-size: 12px; }

        /* Misc */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }

        /* Color picker grid */
        .color-opt { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
        .color-opt:hover { transform: scale(1.15); }
        .color-opt.selected { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }

        /* Icon picker grid */
        .icon-opt { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid transparent; background: var(--bg-input); color: var(--fg-dim); transition: all 0.15s; }
        .icon-opt:hover { background: var(--bg-card-hover); color: var(--fg); }
        .icon-opt.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

        /* Date field: DD/MM/YYYY text display with invisible native picker on top */
        .date-input-wrapper { position: relative; width: 100%; }
        .date-input-wrapper .input-field { cursor: pointer; }
        .date-native-overlay { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; border: 0; margin: 0; padding: 0; cursor: pointer; }

        /* Segmented tab switcher (category/source picker, report breakdowns) */
        .seg-tabs { display: flex; gap: 4px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
        .seg-tab { flex: 1; text-align: center; padding: 8px 10px; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--fg-dim); cursor: pointer; transition: all 0.2s ease; user-select: none; }
        .seg-tab.active { background: var(--bg-card); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

        /* Filter chips (Reports page category/source toggles) */
        .filter-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px 6px 8px; border-radius: 30px; border: 2px solid var(--border); background: var(--bg-card); cursor: pointer; transition: all 0.15s ease; font-size: 12px; font-weight: 500; color: var(--fg-dim); user-select: none; }
        .filter-chip .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .filter-chip.active { border-color: var(--chip-color, var(--accent)); background: var(--chip-bg, var(--accent-glow)); color: var(--chip-color, var(--accent)); }
        .filter-link { font-size: 11px; font-weight: 600; color: var(--accent); cursor: pointer; user-select: none; }

        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #app { margin-left: 0; padding: 20px 16px 100px; }
            #bottom-nav { display: flex; }
            #fab { display: flex; align-items: center; justify-content: center; }
            .amount-input { font-size: 36px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <!-- Background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Sidebar -->
    <aside id="sidebar">
        <div style="padding:24px 20px 20px">
            <div style="display:flex;align-items:center;gap:10px">
                <div style="width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-family:var(--font-heading)">$</div>
                <div>
                    <h1 style="font-size:18px;font-weight:700;line-height:1.1">SpendWise</h1>
                    <span style="font-size:11px;color:var(--muted)">Expense Tracker</span>
                </div>
            </div>
        </div>
        <button class="add-btn-sidebar" onclick="navigate('add')"><i class="fa-solid fa-plus"></i> Add Expense</button>
        <nav style="flex:1;padding:8px 0;overflow-y:auto" id="sidebar-nav">
            <div class="nav-item active" data-view="dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</div>
            <div class="nav-item" data-view="transactions"><i class="fa-solid fa-receipt"></i> Transactions</div>
            <div class="nav-item" data-view="reports"><i class="fa-solid fa-chart-line"></i> Reports</div>
            <div class="nav-item" data-view="categories"><i class="fa-solid fa-tags"></i> Categories & Sources</div>
            <div class="nav-item" data-view="backup"><i class="fa-solid fa-shield-halved"></i> Backup & Restore</div>
        </nav>
        <div style="padding:16px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)" id="sidebar-footer">v2.0.0</div>
    </aside>

    <!-- Main content area -->
    <main id="app"></main>

    <!-- Bottom navigation (mobile) -->
    <nav id="bottom-nav">
        <div class="bnav-item active" data-view="dashboard"><i class="fa-solid fa-chart-pie"></i><span>Home</span></div>
        <div class="bnav-item" data-view="transactions"><i class="fa-solid fa-receipt"></i><span>History</span></div>
        <div class="bnav-item bnav-center"><button class="bnav-center-btn" onclick="navigate('add')" aria-label="Add expense"><i class="fa-solid fa-plus"></i></button></div>
        <div class="bnav-item" data-view="reports"><i class="fa-solid fa-chart-line"></i><span>Reports</span></div>
        <div class="bnav-item" data-view="categories"><i class="fa-solid fa-tags"></i><span>Categories</span></div>
        <div class="bnav-item" data-view="backup"><i class="fa-solid fa-shield-halved"></i><span>Backup</span></div>
    </nav>

    <!-- Modal overlay -->
    <div id="modal-overlay" role="dialog" aria-modal="true">
        <div id="modal-box"></div>
    </div>

    <!-- Toast container -->
    <div id="toasts" aria-live="polite"></div>

    <!-- Mobile FAB -->
    <button id="fab" onclick="navigate('add')" aria-label="Add expense"><i class="fa-solid fa-plus"></i></button>

    <!-- Hidden file input for restore -->
    <input type="file" id="restore-input" accept=".json" style="display:none">

<script>
/* ============================================
   CONSTANTS & DEFAULT DATA
   ============================================ */
const STORAGE_KEY = 'spendwise_data';
const DEFAULT_CATEGORIES = [
    { id: 'c1', name: 'Food & Dining', icon: 'fa-utensils', color: '#f59e0b' },
    { id: 'c2', name: 'Transportation', icon: 'fa-car', color: '#3b82f6' },
    { id: 'c3', name: 'Shopping', icon: 'fa-bag-shopping', color: '#ec4899' },
    { id: 'c4', name: 'Entertainment', icon: 'fa-film', color: '#8b5cf6' },
    { id: 'c5', name: 'Bills & Utilities', icon: 'fa-bolt', color: '#ef4444' },
    { id: 'c6', name: 'Health', icon: 'fa-heart-pulse', color: '#10b981' },
    { id: 'c7', name: 'Education', icon: 'fa-graduation-cap', color: '#06b6d4' },
    { id: 'c8', name: 'Travel', icon: 'fa-plane', color: '#f97316' },
    { id: 'c9', name: 'Groceries', icon: 'fa-cart-shopping', color: '#84cc16' },
    { id: 'c10', name: 'Other', icon: 'fa-ellipsis', color: '#6b7280' }
];
const ICON_OPTIONS = [
    'fa-utensils','fa-car','fa-bag-shopping','fa-film','fa-bolt','fa-heart-pulse',
    'fa-graduation-cap','fa-plane','fa-cart-shopping','fa-ellipsis','fa-music',
    'fa-gamepad','fa-gift','fa-home','fa-dumbbell','fa-book','fa-mug-hot',
    'fa-shirt','fa-baby','fa-scissors','fa-wrench','fa-paintbrush','fa-camera',
    'fa-bicycle','fa-microphone','fa-guitar','fa-pizza-slice','fa-ice-cream',
    'fa-martini-glass','fa-bread-slice','fa-egg','fa-apple-whole','fa-fish',
    'fa-trophy','fa-dice','fa-chess','fa-puzzle-piece','fa-palette','fa-dog',
    'fa-cat','fa-phone','fa-laptop','fa-tv','fa-wifi','fa-gas-pump','fa-bed'
];
const COLOR_OPTIONS = ['#f59e0b','#ef4444','#ec4899','#8b5cf6','#3b82f6','#06b6d4','#10b981','#84cc16','#f97316','#6b7280','#14b8a6','#e11d48'];
const DEFAULT_SOURCES = [
    { id: 's1', name: 'Cash', icon: 'fa-money-bill-wave', color: '#10b981' },
    { id: 's2', name: 'Bank', icon: 'fa-building-columns', color: '#3b82f6' },
    { id: 's3', name: 'UPI', icon: 'fa-mobile-screen-button', color: '#8b5cf6' },
    { id: 's4', name: 'Credit Card', icon: 'fa-credit-card', color: '#f59e0b' },
    { id: 's5', name: 'Other', icon: 'fa-wallet', color: '#6b7280' }
];
const FONT_OPTIONS = [
    { name: 'DM Sans (Default)', body: "'DM Sans', sans-serif", heading: "'Space Grotesk', sans-serif" },
    { name: 'Inter', body: "'Inter', sans-serif", heading: "'Inter', sans-serif" },
    { name: 'Poppins', body: "'Poppins', sans-serif", heading: "'Poppins', sans-serif" },
    { name: 'Nunito', body: "'Nunito', sans-serif", heading: "'Nunito', sans-serif" },
    { name: 'Montserrat', body: "'Montserrat', sans-serif", heading: "'Montserrat', sans-serif" },
    { name: 'Lato', body: "'Lato', sans-serif", heading: "'Lato', sans-serif" },
    { name: 'Merriweather (Serif)', body: "'Merriweather', serif", heading: "'Merriweather', serif" },
    { name: 'System Default', body: "system-ui, -apple-system, sans-serif", heading: "system-ui, -apple-system, sans-serif" }
];
const CURRENCIES = [
    { symbol: '$', name: 'USD' }, { symbol: '€', name: 'EUR' }, { symbol: '£', name: 'GBP' },
    { symbol: '¥', name: 'JPY' }, { symbol: '₹', name: 'INR' }, { symbol: '₩', name: 'KRW' },
    { symbol: '₽', name: 'RUB' }, { symbol: '₺', name: 'TRY' }, { symbol: 'R$', name: 'BRL' },
    { symbol: 'kr', name: 'SEK' }, { symbol: '₴', name: 'UAH' }, { symbol: 'A$', name: 'AUD' }
];

/* ============================================
   STATE MANAGEMENT
   ============================================ */
let state = { expenses: [], categories: [], sources: [], currency: '$', lastBackup: null, fontIndex: 0 };
let currentView = 'dashboard';
let chartCategory = null;
let chartTrend = null;
let chartReport = null;
let deferredPrompt = null;
// Reports page filter state (not persisted)
let reportState = { breakdown: 'category', range: 'day', selectedCats: null, selectedSrcs: null, fromDate: '', toDate: '' };

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) { console.warn('Save failed', e); }
}

function load() {
    try {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (d && d.categories && d.categories.length) {
            state = { ...state, ...d };
            if (!state.sources || !state.sources.length) state.sources = JSON.parse(JSON.stringify(DEFAULT_SOURCES));
        } else {
            state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
            state.sources = JSON.parse(JSON.stringify(DEFAULT_SOURCES));
            generateSampleData();
            save();
        }
    } catch(e) {
        state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
        state.sources = JSON.parse(JSON.stringify(DEFAULT_SOURCES));
        generateSampleData();
        save();
    }
    if (typeof state.fontIndex !== 'number' || !FONT_OPTIONS[state.fontIndex]) state.fontIndex = 0;
    applyFont();
}

function applyFont() {
    const f = FONT_OPTIONS[state.fontIndex] || FONT_OPTIONS[0];
    document.documentElement.style.setProperty('--font-body', f.body);
    document.documentElement.style.setProperty('--font-heading', f.heading);
}

function currentChartFontFamily() {
    const f = FONT_OPTIONS[state.fontIndex] || FONT_OPTIONS[0];
    return f.body.split(',')[0].replace(/'/g, '');
}

function generateSampleData() {
    const notes = {
        c1: ['Lunch at bistro','Coffee & pastry','Dinner takeout','Smoothie bar','Sushi night','Breakfast bagel'],
        c2: ['Uber ride','Gas station','Bus pass','Parking fee','Toll road','Metro card'],
        c3: ['New headphones','Winter jacket','Book order','Phone case','Running shoes','Home decor'],
        c4: ['Movie tickets','Streaming sub','Concert pass','Game purchase','Museum entry','Bowling night'],
        c5: ['Electric bill','Water bill','Internet bill','Phone plan','Gas bill','Insurance'],
        c6: ['Gym membership','Pharmacy','Doctor visit','Vitamins','Dental checkup','Eye exam'],
        c7: ['Online course','Textbook','Workshop fee','Certification','Study materials','Tutoring'],
        c8: ['Flight ticket','Hotel stay','Travel insurance','Souvenirs','Luggage','Rental car'],
        c9: ['Weekly groceries','Fruits & veggies','Snacks','Dairy & eggs','Meat & fish','Bread & cereal'],
        c10: ['Miscellaneous','Subscription','Donation','Pet supplies','Laundry','Dry cleaning']
    };
    const amounts = { c1:[8,35], c2:[5,60], c3:[15,200], c4:[10,50], c5:[40,150], c6:[10,80], c7:[10,100], c8:[30,300], c9:[20,90], c10:[5,50] };
    const now = Date.now();
    const dayMs = 86400000;
    const srcPool = (state.sources && state.sources.length) ? state.sources : DEFAULT_SOURCES;
    for (let i = 0; i < 25; i++) {
        const catId = DEFAULT_CATEGORIES[Math.floor(Math.random() * DEFAULT_CATEGORIES.length)].id;
        const range = amounts[catId];
        const amt = Math.round((range[0] + Math.random() * (range[1] - range[0])) * 100) / 100;
        const noteArr = notes[catId];
        state.expenses.push({
            id: uid(),
            amount: amt,
            categoryId: catId,
            sourceId: srcPool[Math.floor(Math.random() * srcPool.length)].id,
            note: noteArr[Math.floor(Math.random() * noteArr.length)],
            date: new Date(now - Math.floor(Math.random() * 30) * dayMs).toISOString().split('T')[0],
            createdAt: now - Math.floor(Math.random() * 30) * dayMs
        });
    }
    state.expenses.sort((a, b) => b.createdAt - a.createdAt);
}

function getCat(id) { return state.categories.find(c => c.id === id) || { name: 'Unknown', icon: 'fa-question', color: '#6b7280' }; }
function getSrc(id) { return state.sources.find(s => s.id === id) || { name: 'Unspecified', icon: 'fa-wallet', color: '#6b7280' }; }
function fmt(n) { return state.currency + n.toFixed(2); }
// DD/MM/YYYY throughout the app
function fmtDate(d) { const dt = new Date(d + 'T00:00:00'); return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`; }
function fmtDateFull(d) { const dt = new Date(d + 'T00:00:00'); return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`; }
// ISO (yyyy-mm-dd, what <input type=date> uses) -> DD/MM/YYYY display string
function isoToDisplay(iso) { if (!iso) return ''; const p = iso.split('-'); if (p.length !== 3) return ''; return `${p[2]}/${p[1]}/${p[0]}`; }
// Wire a text-display + native date input pair: clicking/typing the text opens the native
// picker, and the text always mirrors the native value in DD/MM/YYYY (fixes the classic bug
// where the visible field doesn't refresh after picking a date from the calendar).
function wireDateField(nativeId, textId) {
    const native = document.getElementById(nativeId);
    const text = document.getElementById(textId);
    if (!native || !text) return;
    const sync = () => { text.value = isoToDisplay(native.value); };
    sync();
    native.addEventListener('input', sync);
    native.addEventListener('change', sync);
}
function dateFieldHTML(nativeId, textId, value, extraClass) {
    return `<div class="date-input-wrapper ${extraClass || ''}">
        <input type="text" id="${textId}" class="input-field" placeholder="DD/MM/YYYY" value="${isoToDisplay(value)}" readonly>
        <input type="date" id="${nativeId}" class="date-native-overlay" value="${value || ''}">
    </div>`;
}
function monthExpenses() {
    const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
    return state.expenses.filter(e => { const d = new Date(e.date + 'T00:00:00'); return d.getFullYear() === y && d.getMonth() === m; });
}

function toast(msg, type = 'success') {

function navigate(view) {
    currentView = view;
    // Update sidebar nav
    document.querySelectorAll('#sidebar-nav .nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
    // Update bottom nav
    document.querySelectorAll('#bottom-nav .bnav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));

    document.getElementById('sidebar').classList.remove('open');

        case 'dashboard': renderDashboard(); break;
        case 'add': renderAddExpense(); break;
        case 'transactions': renderTransactions(); break;
        case 'reports': renderReports(); break;
        case 'categories': renderCategories(); break;
        case 'backup': renderBackup(); break;

}

function buildCategoryChart(expenses) {
    const totals = {};
    expenses.forEach(e => { totals[e.categoryId] = (totals[e.categoryId] || 0) + e.amount; });
    const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    const labels = sorted.map(([id]) => getCat(id).name);
    const data = sorted.map(([, v]) => v);
    const colors = sorted.map(([id]) => getCat(id).color);

    const ctx = document.getElementById('chart-cat');
    if (!ctx) return;
    const cd = getChartDefaults();
    chartCategory = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 8 }] },
        options: { ...cd, cutout: '65%', plugins: { ...cd.plugins, legend: { position: 'bottom', labels: { ...cd.plugins.legend.labels, boxWidth: 10, padding: 12, font: { size: 11 } } } } }
    });
}

function buildTrendChart() {
    const days = [];
    const now = new Date();
    for (let i = 6; i >= 0; i--) {
        const d = new Date(now); d.setDate(d.getDate() - i);
        const ds = d.toISOString().split('T')[0];
        const total = state.expenses.filter(e => e.date === ds).reduce((s, e) => s + e.amount, 0);
        days.push({ label: d.toLocaleDateString('en-US', { weekday: 'short' }), value: total });
    }
    const ctx = document.getElementById('chart-trend');
    if (!ctx) return;
    const cd = getChartDefaults();
    chartTrend = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: days.map(d => d.label),
            datasets: [{
                data: days.map(d => d.value),
                backgroundColor: days.map(d => d.value > 0 ? 'rgba(245,158,11,0.75)' : 'rgba(245,158,11,0.12)'),
                borderRadius: 6, borderSkipped: false, barPercentage: 0.6
            }]
        },
        options: { ...cd, plugins: { ...cd.plugins, legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#9498ad', font: { size: 11 } } }, y: { grid: { color: 'rgba(231,232,240,0.9)' }, ticks: { color: '#9498ad', font: { size: 11 }, callback: v => state.currency + v } } } }
    });
}

function renderTxList(expenses) {
    return expenses.map(e => {

function saveExpense(editId) {
    const amountEl = document.getElementById('exp-amount');
    const noteEl = document.getElementById('exp-note');
    const dateEl = document.getElementById('exp-date');
    const amountErr = document.getElementById('amount-error');
    const catErr = document.getElementById('cat-error');

    const amount = parseFloat(amountEl.value);
    const app = document.getElementById('app');
    const catId = app._selectedCat ? app._selectedCat() : '';
    const srcId = app._selectedSrc ? app._selectedSrc() : '';
    let valid = true;

    if (!amount || amount <= 0) {
        amountErr.textContent = 'Please enter a valid amount'; amountErr.style.display = 'block'; valid = false;
    } else { amountErr.style.display = 'none'; }

    if (!catId) {
        catErr.textContent = 'Please select a category (and source)'; catErr.style.display = 'block'; valid = false;
    } else { catErr.style.display = 'none'; }

    if (!valid) return;

    if (editId) {
        const idx = state.expenses.findIndex(e => e.id === editId);
        if (idx > -1) {
            state.expenses[idx] = { ...state.expenses[idx], amount, categoryId: catId, sourceId: srcId, note: noteEl.value.trim(), date: dateEl.value };
        }
        toast('Expense updated successfully');
    } else {
        state.expenses.unshift({ id: uid(), amount, categoryId: catId, sourceId: srcId, note: noteEl.value.trim(), date: dateEl.value, createdAt: Date.now() });
        toast('Expense added successfully');
    }
    save();
    navigate('dashboard');
}

            </select>

        const search = document.getElementById('tx-search').value.toLowerCase();
        const catFilter = document.getElementById('tx-cat-filter').value;

        let filtered = state.expenses.filter(e => {
            if (search && !(e.note || '').toLowerCase().includes(search) && !getCat(e.categoryId).name.toLowerCase().includes(search)) return false;
            if (catFilter && e.categoryId !== catFilter) return false;
            if (monthFilter && !e.date.startsWith(monthFilter)) return false;

        });

        const listEl = document.getElementById('tx-list');
        const sumEl = document.getElementById('tx-summary');
        const total = filtered.reduce((s, e) => s + e.amount, 0);

function getMonthOptions() {
    const months = new Set();
    state.expenses.forEach(e => months.add(e.date.slice(0, 7)));
    return [...months].sort().reverse().map(m => {
        const [y, mo] = m.split('-');
        const label = new Date(parseInt(y), parseInt(mo) - 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        return `<option value="${m}">${label}</option>`;
    }).join('');
}

/* ============================================
   RENDER: REPORTS (dynamic category + source
   breakdown tabs — filters apply together)

function toISO(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }

function syncReportSelections() {
    if (!reportState.selectedCats) reportState.selectedCats = state.categories.map(c => c.id);
    else reportState.selectedCats = reportState.selectedCats.filter(id => state.categories.some(c => c.id === id));
    if (!reportState.selectedSrcs) reportState.selectedSrcs = state.sources.map(s => s.id);
    else reportState.selectedSrcs = reportState.selectedSrcs.filter(id => state.sources.some(s => s.id === id));
}

function getWeekNumber(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
    const week1 = new Date(d.getFullYear(), 0, 4);
    return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function timeBucketKey(dateStr, range) {
    const d = new Date(dateStr + 'T00:00:00');
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if (range === 'week') return `Week ${getWeekNumber(d)}, ${d.getFullYear()}`;
    if (range === 'month') return `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    if (range === 'year') return `${d.getFullYear()}`;
    return fmtDate(dateStr);
}

function getReportFiltered() {
    const from = reportState.fromDate ? new Date(reportState.fromDate + 'T00:00:00') : null;
    const to = reportState.toDate ? new Date(reportState.toDate + 'T23:59:59') : null;
    return state.expenses.filter(e => {
        const d = new Date(e.date + 'T00:00:00');
        if (from && d < from) return false;
        if (to && d > to) return false;
        if (!reportState.selectedCats.includes(e.categoryId)) return false;
        if (e.sourceId && !reportState.selectedSrcs.includes(e.sourceId)) return false;
        return true;
    });
}

                <div class="seg-tab" data-range="month">Month</div>

            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
                <div>
                    <label style="font-size:11px;font-weight:600;color:var(--fg-dim);display:block;margin-bottom:6px">FROM</label>
                    ${dateFieldHTML('rpt-from', 'rpt-from-text', reportState.fromDate)}
                </div>
                <div>

                    ${dateFieldHTML('rpt-to', 'rpt-to-text', reportState.toDate)}
                </div>
            </div>

            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <span style="font-size:11px;font-weight:600;color:var(--fg-dim);text-transform:uppercase">Categories</span>
                <span><span class="filter-link" id="rpt-cat-all">All</span> &nbsp; <span class="filter-link" id="rpt-cat-none">None</span></span>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px" id="rpt-cat-chips"></div>

            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <span style="font-size:11px;font-weight:600;color:var(--fg-dim);text-transform:uppercase">Sources</span>
                <span><span class="filter-link" id="rpt-src-all">All</span> &nbsp; <span class="filter-link" id="rpt-src-none">None</span></span>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px" id="rpt-src-chips"></div>
        </div>

        <div class="card" style="margin-bottom:16px">
            <div style="height:260px;position:relative" id="rpt-chart-wrap"></div>
        </div>

        <div class="card">

                <h3 style="font-size:15px;font-weight:600">Summary</h3>
                <span id="rpt-count" style="font-size:12px;color:var(--muted)"></span>
            </div>

    document.getElementById('rpt-breakdown').value = reportState.breakdown;
    wireDateField('rpt-from', 'rpt-from-text');

    document.getElementById('rpt-breakdown').addEventListener('change', e => {

    document.querySelectorAll('#rpt-range-tabs .seg-tab').forEach(t => {

    document.getElementById('rpt-from').addEventListener('change', () => { reportState.fromDate = document.getElementById('rpt-from').value; refreshReports(); });

function renderReportChips() {
    const from = reportState.fromDate ? new Date(reportState.fromDate + 'T00:00:00') : null;
    const to = reportState.toDate ? new Date(reportState.toDate + 'T23:59:59') : null;
    const dateFiltered = state.expenses.filter(e => {
        const d = new Date(e.date + 'T00:00:00');
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
    });

    const catCounts = {};
    dateFiltered.filter(e => e.sourceId ? reportState.selectedSrcs.includes(e.sourceId) : true).forEach(e => { catCounts[e.categoryId] = (catCounts[e.categoryId] || 0) + e.amount; });
    document.getElementById('rpt-cat-chips').innerHTML = state.categories.map(c => {
        const active = reportState.selectedCats.includes(c.id);
        return `<div class="filter-chip ${active ? 'active' : ''}" style="--chip-color:${c.color};--chip-bg:${c.color}18" data-kind="cat" data-id="${c.id}"><span class="dot" style="background:${c.color}"></span>${c.name} <span style="opacity:.65">${fmt(catCounts[c.id] || 0)}</span></div>`;
    }).join('') || '<span style="font-size:12px;color:var(--muted)">No categories yet</span>';

    const srcCounts = {};
    dateFiltered.filter(e => reportState.selectedCats.includes(e.categoryId)).forEach(e => { if (e.sourceId) srcCounts[e.sourceId] = (srcCounts[e.sourceId] || 0) + e.amount; });
    document.getElementById('rpt-src-chips').innerHTML = state.sources.map(s => {
        const active = reportState.selectedSrcs.includes(s.id);
        return `<div class="filter-chip ${active ? 'active' : ''}" style="--chip-color:${s.color};--chip-bg:${s.color}18" data-kind="src" data-id="${s.id}"><span class="dot" style="background:${s.color}"></span>${s.name} <span style="opacity:.65">${fmt(srcCounts[s.id] || 0)}</span></div>`;
    }).join('') || '<span style="font-size:12px;color:var(--muted)">No sources yet</span>';

    document.querySelectorAll('#rpt-cat-chips .filter-chip, #rpt-src-chips .filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const arr = chip.dataset.kind === 'cat' ? reportState.selectedCats : reportState.selectedSrcs;
            const idx = arr.indexOf(chip.dataset.id);
            if (idx > -1) arr.splice(idx, 1); else arr.push(chip.dataset.id);
            refreshReports();
        });
    });
}

function refreshReports() {
    renderReportChips();
    const filtered = getReportFiltered();
    const total = filtered.reduce((s, e) => s + e.amount, 0);
    document.getElementById('rpt-count').textContent = `${filtered.length} entries · ${fmt(total)}`;

    let grouped = {};
    if (reportState.breakdown === 'category') {
        filtered.forEach(e => { const c = getCat(e.categoryId); grouped[c.name] = grouped[c.name] || { amt: 0, color: c.color }; grouped[c.name].amt += e.amount; });
    } else if (reportState.breakdown === 'source') {
        filtered.forEach(e => { const s = e.sourceId ? getSrc(e.sourceId) : { name: 'Unspecified', color: '#6b7280' }; grouped[s.name] = grouped[s.name] || { amt: 0, color: s.color }; grouped[s.name].amt += e.amount; });
    } else {
        filtered.forEach(e => { const key = timeBucketKey(e.date, reportState.range); grouped[key] = grouped[key] || { amt: 0, color: '#f59e0b' }; grouped[key].amt += e.amount; });
    }

    const labels = Object.keys(grouped);
    const values = labels.map(l => grouped[l].amt);
    const colors = labels.map(l => grouped[l].color);

    const wrap = document.getElementById('rpt-chart-wrap');
    if (chartReport) { chartReport.destroy(); chartReport = null; }
    if (!labels.length) {
        wrap.innerHTML = '<div class="empty-state" style="padding:30px"><i class="fa-solid fa-chart-pie"></i><p>No expenses match these filters</p></div>';
    } else {
        wrap.innerHTML = '<canvas id="chart-report"></canvas>';
        const cd = getChartDefaults();
        chartReport = new Chart(document.getElementById('chart-report'), {
            type: 'doughnut',
            data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#ffffff', hoverOffset: 8 }] },
            options: { ...cd, cutout: '62%', plugins: { ...cd.plugins, legend: { position: 'bottom', labels: { ...cd.plugins.legend.labels, boxWidth: 10, padding: 10, font: { size: 11 } } } } }
        });
    }

    const sorted = labels.map(l => ({ label: l, ...grouped[l] })).sort((a, b) => b.amt - a.amt);
    document.getElementById('rpt-summary-list').innerHTML = sorted.length ? sorted.map(item => `
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            <span style="width:10px;height:10px;border-radius:50%;background:${item.color};flex-shrink:0"></span>
            <span style="flex:1;font-size:13px">${item.label}</span>
            <span style="font-size:13px;font-weight:600;font-family:var(--font-heading)">${fmt(item.amt)}</span>
            <span style="font-size:11px;color:var(--muted);width:42px;text-align:right">${total ? Math.round(item.amt / total * 100) : 0}%</span>
        </div>
    `).join('') : '<div class="empty-state" style="padding:20px"><p>No data for this period</p></div>';
}

function openAddItemModal(kind) {

function setupPickers() {
    let selIcon = document.querySelector('#icon-picker .selected')?.dataset.icon || ICON_OPTIONS[0];
    let selColor = document.querySelector('#color-picker .selected')?.dataset.color || COLOR_OPTIONS[0];

    document.getElementById('icon-picker').addEventListener('click', e => {
        const opt = e.target.closest('.icon-opt');
        if (!opt) return;
        document.querySelectorAll('#icon-picker .icon-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selIcon = opt.dataset.icon;
    });
    document.getElementById('color-picker').addEventListener('click', e => {
        const opt = e.target.closest('.color-opt');
        if (!opt) return;
        document.querySelectorAll('#color-picker .color-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selColor = opt.dataset.color;
    });

    // Store getters
    document.getElementById('modal-box')._getIcon = () => selIcon;
    document.getElementById('modal-box')._getColor = () => selColor;
}

function saveNewItem(kind) {
    const name = document.getElementById('new-item-name').value.trim();
    if (!name) { toast('Please enter a name', 'error'); return; }
    const list = kind === 'category' ? state.categories : state.sources;
    if (list.some(c => c.name.toLowerCase() === name.toLowerCase())) { toast((kind === 'category' ? 'Category' : 'Source') + ' already exists', 'error'); return; }
    const modal = document.getElementById('modal-box');
    list.push({ id: uid(), name, icon: modal._getIcon(), color: modal._getColor() });
    save(); closeModal(); toast((kind === 'category' ? 'Category' : 'Source') + ' created'); renderCategories();
}

function saveEditItem(kind, id) {
    const name = document.getElementById('new-item-name').value.trim();
    if (!name) { toast('Please enter a name', 'error'); return; }
    const modal = document.getElementById('modal-box');
    const list = kind === 'category' ? state.categories : state.sources;
    const item = list.find(x => x.id === id);
    if (item) { item.name = name; item.icon = modal._getIcon(); item.color = modal._getColor(); }
    save(); closeModal(); toast((kind === 'category' ? 'Category' : 'Source') + ' updated'); renderCategories();
}

function confirmDeleteItem(kind, id) {
    const list = kind === 'category' ? state.categories : state.sources;
    const item = list.find(x => x.id === id) || { name: 'Unknown' };
    const field = kind === 'category' ? 'categoryId' : 'sourceId';
    const count = state.expenses.filter(e => e[field] === id).length;
    const impact = kind === 'category'
        ? (count ? `This will also delete ${count} associated transaction${count > 1 ? 's' : ''}.` : 'No transactions use this category.')
        : (count ? `${count} transaction${count > 1 ? 's' : ''} will be kept but marked "Unspecified" source.` : 'No transactions use this source.');
    openModal(`
        <div style="text-align:center;padding:10px 0">
            <div style="width:56px;height:56px;border-radius:50%;background:var(--danger-glow);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:var(--danger)"><i class="fa-solid fa-trash"></i></div>

            <p style="color:var(--fg-dim);font-size:14px;margin-bottom:24px">${impact} This cannot be undone.</p>
            <div style="display:flex;gap:10px">
                <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
                <button class="btn-danger" style="flex:1" onclick="deleteItem('${kind}','${id}')">Delete</button>
            </div>
        </div>
    `);
}

function deleteItem(kind, id) {
    if (kind === 'category') {
        state.expenses = state.expenses.filter(e => e.categoryId !== id);
        state.categories = state.categories.filter(c => c.id !== id);
    } else {
        state.expenses.forEach(e => { if (e.sourceId === id) e.sourceId = null; });
        state.sources = state.sources.filter(s => s.id !== id);
    }
    save(); closeModal(); toast((kind === 'category' ? 'Category' : 'Source') + ' deleted', 'error'); renderCategories();
}

function exportBackup() {
    const data = {
        app: 'SpendWise',
        version: '2.0.0',
        exportedAt: new Date().toISOString(),
        data: { expenses: state.expenses, categories: state.categories, sources: state.sources, currency: state.currency, fontIndex: state.fontIndex }
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `spendwise-backup-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    state.lastBackup = new Date().toISOString().split('T')[0];
    save();
    toast('Backup downloaded successfully');
    renderBackup();
}

// Converts a backup exported from the old (non-SpendWise) tracker — where categories/
// sources were plain string lists and expenses referenced them by name — into SpendWise's
// id-based structure, generating icons/colors for anything it doesn't recognize.
function convertOldBackup(raw) {
    const oldCategoryNames = Array.isArray(raw.categories) && raw.categories.length
        ? raw.categories : ['Food', 'Transport', 'Shopping', 'Bills', 'Entertainment', 'Health', 'Other'];
    const oldSourceNames = Array.isArray(raw.sources) && raw.sources.length
        ? raw.sources : ['Cash', 'Bank', 'UPI', 'Credit Card', 'Other'];
    const oldExpenses = Array.isArray(raw.expenses) ? raw.expenses : (Array.isArray(raw) ? raw : []);

    const catIconMap = { food: 'fa-utensils', transport: 'fa-car', shopping: 'fa-bag-shopping', bills: 'fa-bolt', entertainment: 'fa-film', health: 'fa-heart-pulse', other: 'fa-ellipsis' };
    const catColorMap = { food: '#3b82f6', transport: '#f59e0b', shopping: '#ef4444', bills: '#8b5cf6', entertainment: '#10b981', health: '#ec4899', other: '#6b7280' };
    const srcIconMap = { cash: 'fa-money-bill-wave', bank: 'fa-building-columns', upi: 'fa-mobile-screen-button', 'credit card': 'fa-credit-card', other: 'fa-wallet' };
    const srcColorMap = { cash: '#10b981', bank: '#3b82f6', upi: '#8b5cf6', 'credit card': '#f59e0b', other: '#6b7280' };

    const categories = oldCategoryNames.map((name, i) => ({
        id: uid(), name,
        icon: catIconMap[String(name).toLowerCase()] || ICON_OPTIONS[i % ICON_OPTIONS.length],
        color: catColorMap[String(name).toLowerCase()] || COLOR_OPTIONS[i % COLOR_OPTIONS.length]
    }));
    const sources = oldSourceNames.map((name, i) => ({
        id: uid(), name,
        icon: srcIconMap[String(name).toLowerCase()] || ICON_OPTIONS[i % ICON_OPTIONS.length],
        color: srcColorMap[String(name).toLowerCase()] || COLOR_OPTIONS[i % COLOR_OPTIONS.length]
    }));

    const catByName = {}; categories.forEach(c => catByName[c.name.toLowerCase()] = c);
    const srcByName = {}; sources.forEach(s => srcByName[s.name.toLowerCase()] = s);

    const expenses = oldExpenses
        .filter(e => e && typeof e === 'object' && e.amount != null && e.category && e.date)
        .map((e, i) => {
            let cat = catByName[String(e.category).toLowerCase()];
            if (!cat) {
                cat = { id: uid(), name: String(e.category), icon: 'fa-ellipsis', color: COLOR_OPTIONS[categories.length % COLOR_OPTIONS.length] };
                categories.push(cat); catByName[cat.name.toLowerCase()] = cat;
            }
            let src = null;
            if (e.source) {
                src = srcByName[String(e.source).toLowerCase()];
                if (!src) {
                    src = { id: uid(), name: String(e.source), icon: 'fa-wallet', color: COLOR_OPTIONS[sources.length % COLOR_OPTIONS.length] };
                    sources.push(src); srcByName[src.name.toLowerCase()] = src;
                }
            }
            return {
                id: uid(),
                amount: Number(e.amount) || 0,
                categoryId: cat.id,
                sourceId: src ? src.id : null,
                note: e.description || e.note || '',
                date: e.date,
                createdAt: typeof e.id === 'number' ? e.id : (Date.now() - i)
            };
        });

    return { expenses, categories, sources, currency: state.currency || '₹' };
}

// Restore handler — accepts native SpendWise backups AND JSON exported from the old tracker
document.getElementById('restore-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const parsed = JSON.parse(ev.target.result);
            let converted, sourceLabel;

            if (parsed.data && Array.isArray(parsed.data.expenses) && Array.isArray(parsed.data.categories)) {
                // Native SpendWise format
                const validExp = parsed.data.expenses.every(x => x.id && typeof x.amount === 'number' && x.categoryId && x.date);
                const validCat = parsed.data.categories.every(c => c.id && c.name && c.icon && c.color);
                if (!validExp || !validCat) { toast('Backup file contains invalid data', 'error'); return; }
                converted = {
                    expenses: parsed.data.expenses,
                    categories: parsed.data.categories,
                    sources: (Array.isArray(parsed.data.sources) && parsed.data.sources.length) ? parsed.data.sources : JSON.parse(JSON.stringify(DEFAULT_SOURCES)),
                    currency: parsed.data.currency || state.currency
                };
                sourceLabel = 'SpendWise backup';
            } else if (Array.isArray(parsed.expenses) || Array.isArray(parsed)) {
                // Old tracker format: top-level expenses[], categories[]/sources[] as plain name strings
                converted = convertOldBackup(parsed);
                sourceLabel = 'old tracker backup';
            } else {
                toast('Invalid backup file format', 'error');
                return;
            }

            if (!converted.expenses.length && !converted.categories.length) {
                toast('Backup file contains no data', 'error');
                return;
            }

            openModal(`
                <div style="text-align:center;padding:10px 0">
                    <div style="width:56px;height:56px;border-radius:50%;background:rgba(59,130,246,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:#3b82f6"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                    <h3 style="font-size:18px;font-weight:700;margin-bottom:8px">Restore Backup?</h3>
                    <p style="color:var(--fg-dim);font-size:14px;margin-bottom:6px">Detected a ${sourceLabel} containing:</p>
                    <p style="color:var(--fg);font-size:14px;font-weight:600;margin-bottom:4px">${converted.expenses.length} transactions, ${converted.categories.length} categories, ${converted.sources.length} sources</p>
                    <p style="color:var(--muted);font-size:12px;margin-bottom:24px">Exported: ${parsed.exportedAt ? new Date(parsed.exportedAt).toLocaleString() : 'Unknown'}</p>
                    <p style="color:var(--danger);font-size:13px;margin-bottom:20px"><i class="fa-solid fa-triangle-exclamation" style="margin-right:4px"></i>This will replace all your current data.</p>
                    <div style="display:flex;gap:10px">
                        <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
                        <button class="btn-primary" style="flex:1;background:#3b82f6" onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='#3b82f6'" onclick="doRestore()">Restore</button>
                    </div>
                </div>
            `);
            document.getElementById('modal-box')._backupData = converted;
        } catch(err) {
            toast('Failed to read backup file', 'error');
        }
    };
    reader.readAsText(file);
    e.target.value = ''; // Reset for re-import
});

function doRestore() {
    const data = document.getElementById('modal-box')._backupData;
    if (data) {
        state.expenses = data.expenses;
        state.categories = data.categories;
        state.sources = data.sources && data.sources.length ? data.sources : JSON.parse(JSON.stringify(DEFAULT_SOURCES));
        if (data.currency) state.currency = data.currency;
        save();
        closeModal();
        toast('Data restored successfully');
        renderBackup();
    }
}

            <h3 style="font-size:18px;font-weight:700;margin-bottom:8px">Clear All Data?</h3>
            <p style="color:var(--fg-dim);font-size:14px;margin-bottom:24px">All ${state.expenses.length} transactions, ${state.categories.length} categories and ${state.sources.length} sources will be permanently deleted. This cannot be undone.</p>
            <div style="display:flex;gap:10px">
                <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
                <button class="btn-danger" style="flex:1" onclick="clearAllData()">Delete Everything</button>
            </div>
        </div>
    `);
}

function clearAllData() {
    state.expenses = [];
    state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    state.sources = JSON.parse(JSON.stringify(DEFAULT_SOURCES));
    state.lastBackup = null;
    save(); closeModal(); toast('All data cleared', 'error'); renderBackup();
}

/* ============================================
   PWA SETUP
   ============================================ */
function setupPWA() {
    // Generate app icon via canvas
    function generateIcon(size) {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const r = size * 0.19;
        // Rounded rect background
        ctx.fillStyle = '#151821';
        ctx.beginPath();
        ctx.roundRect(0, 0, size, size, r);
        ctx.fill();
        // Circle
        ctx.strokeStyle = '#f59e0b';
        ctx.lineWidth = Math.max(1, size * 0.04);
        ctx.beginPath();
        ctx.arc(size / 2, size / 2, size * 0.27, 0, Math.PI * 2);
        ctx.stroke();
        // Dollar sign
        ctx.fillStyle = '#f59e0b';
        ctx.font = `bold ${size * 0.32}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', size / 2, size / 2 + size * 0.015);
        return canvas.toDataURL('image/png');
    }

    const icon192 = generateIcon(192);
    const icon512 = generateIcon(512);

    // Create manifest
    const manifest = {
        name: 'SpendWise — Expense Tracker',
        short_name: 'SpendWise',
        description: 'Track your personal expenses with categories, backup & restore',
        start_url: window.location.href.split('?')[0],
        display: 'standalone',
        background_color: '#f4f5fa',
        theme_color: '#f59e0b',
        orientation: 'any',
        icons: [
            { src: icon192, sizes: '192x192', type: 'image/png' },
            { src: icon512, sizes: '512x512', type: 'image/png' }
        ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

    // Set apple touch icon
    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = icon192;
    document.head.appendChild(link);

    // Attempt service worker registration (works in Firefox; graceful fallback in Chrome)
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE_NAME = 'spendwise-v1';
            self.addEventListener('install', e => { self.skipWaiting(); });
            self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
            self.addEventListener('fetch', e => {
                e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
            });
        `;
        try {
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
        } catch(e) {}
    }

    // Capture install prompt
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
    });
}

function installPWA() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(result => {
            if (result.outcome === 'accepted') toast('App installed successfully');
            deferredPrompt = null;
        });
    } else {
        toast('Use your browser menu to install this app', 'info');
    }
}

/* ============================================
   KEYBOARD SHORTCUTS
   ============================================ */
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if (e.key === 'n' || e.key === 'N') { e.preventDefault(); navigate('add'); }
    if (e.key === 'd' || e.key === 'D') { e.preventDefault(); navigate('dashboard'); }
    if (e.key === 't' || e.key === 'T') { e.preventDefault(); navigate('transactions'); }
    if (e.key === 'r' || e.key === 'R') { e.preventDefault(); navigate('reports'); }
    if (e.key === 'Escape') closeModal();
});

/* ============================================
   INIT
   ============================================ */
load();
setupPWA();
navigate('dashboard');
</script>
